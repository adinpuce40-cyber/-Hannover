<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response London ULTRA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
overflow:hidden;
color:white;
}

/* ================= LOADING ================= */

#loading{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
transition:1s;
}

.loader{
width:120px;
height:120px;
border-radius:50%;
border:6px solid rgba(255,255,255,.2);
border-top:6px solid cyan;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.progress{
width:400px;
height:18px;
background:#111;
border-radius:50px;
margin-top:20px;
overflow:hidden;
box-shadow:0 0 20px cyan;
}

.bar{
width:0%;
height:100%;
background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,purple);
transition:.2s;
}

/* ================= LOGIN ================= */

#login{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#111,#000);
animation:fadeIn 1s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.login-box{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
text-align:center;
width:420px;
box-shadow:0 0 50px cyan;
transform:scale(.9);
animation:pop .5s forwards;
}

@keyframes pop{
to{transform:scale(1);}
}

input{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
outline:none;
text-align:center;
background:#111;
color:white;
box-shadow:0 0 15px cyan;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{box-shadow:0 0 30px cyan;}
}

button{
margin-top:20px;
padding:15px 40px;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,cyan,blue,purple);
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 30px cyan;
}

/* ================= WEBSITE ================= */

#website{
display:none;
height:100vh;
overflow:auto;
padding:40px;
background:linear-gradient(-45deg,#000,#111,#000,#0a0a0a);
background-size:400% 400%;
animation:bg 10s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* GLITCH TITLE */

.title{
font-size:80px;
text-align:center;
font-weight:bold;
text-transform:uppercase;
animation:glitch 2s infinite;
text-shadow:0 0 20px cyan;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(2px,-2px);}
60%{transform:translate(-1px,1px);}
80%{transform:translate(1px,-1px);}
100%{transform:translate(0);}
}

/* BUTTONS */

.buttons{
margin-top:30px;
text-align:center;
}

.btn{
display:inline-block;
padding:15px 40px;
margin:10px;
border-radius:50px;
text-decoration:none;
color:white;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
transition:.3s;
position:relative;
overflow:hidden;
}

.btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,white,transparent);
transition:.5s;
}

.btn:hover::before{
left:100%;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px cyan;
}

/* STAFF CARDS */

.staff{
margin-top:60px;
text-align:center;
}

.staff-card{
background:rgba(255,255,255,.06);
margin:15px auto;
padding:20px;
border-radius:15px;
max-width:600px;
transition:.4s;
box-shadow:0 0 10px rgba(0,255,255,.2);
}

.staff-card:hover{
transform:translateY(-10px) rotateX(10deg);
box-shadow:0 0 40px cyan;
}

/* PARTICLES */

#particles{
position:fixed;
inset:0;
pointer-events:none;
}

.p{
position:absolute;
width:6px;
height:6px;
background:cyan;
border-radius:50%;
animation:float linear infinite;
opacity:.6;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-100vh);}
}

/* FLASH EFFECT */

.flash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
z-index:99999;
}

.flash.active{
animation:flash .5s;
}

@keyframes flash{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

</style>
</head>

<body>

<div id="particles"></div>
<div class="flash" id="flash"></div>

<!-- LOADING -->
<div id="loading">
<div class="loader"></div>
<h2>Booting Response London System...</h2>
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h1>🔒 SECURITY ACCESS</h1>
<p>Enter Code</p>

<input id="code" type="password" placeholder="••••">

<button onclick="check()">ENTER</button>

<p id="error"></p>
</div>
</div>

<!-- WEBSITE -->
<div id="website">

<div class="title">RESPONSE LONDON</div>

<div class="buttons">
<a class="btn" href="https://www.roblox.com/games/71350675430720/Response-London">🎮 ROBLOX</a>
<a class="btn" href="https://discord.gg/UFhpVPVK">💬 DISCORD</a>
</div>

<div class="staff">

<h1>👑 STAFF TEAM</h1>

<div class="staff-card">Nadz — Lead Developer</div>
<div class="staff-card">Raz — Support</div>
<div class="staff-card">Pete — Manager</div>
<div class="staff-card">Alex — Founder</div>

</div>

</div>

<script>

/* LOADING */
let p=0;
let load=setInterval(()=>{
p++;
document.getElementById("bar").style.width=p+"%";
if(p>=100){
clearInterval(load);
document.getElementById("loading").style.opacity="0";
setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("login").style.display="flex";
},1000);
}
},25);

/* FLASH */
function flash(){
document.getElementById("flash").classList.add("active");
setTimeout(()=>{
document.getElementById("flash").classList.remove("active");
},500);
}

/* CHECK CODE */
function check(){
if(document.getElementById("code").value==="1234"){
flash();
document.getElementById("login").style.display="none";
document.getElementById("website").style.display="block";
}else{
document.getElementById("error").innerText="❌ WRONG CODE";
}
}

/* PARTICLES */
for(let i=0;i<60;i++){
let d=document.createElement("div");
d.className="p";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(Math.random()*10+5)+"s";
document.getElementById("particles").appendChild(d);
}

</script>

</body>
</html>
