<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response England</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
overflow:hidden;
color:white;
}

/* HUD */
.hud{
position:fixed;
inset:0;
pointer-events:none;
background:radial-gradient(circle,transparent 60%,rgba(0,255,255,.05));
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

.introText{
font-size:60px;
letter-spacing:10px;
animation:glitch 1s infinite;
text-shadow:0 0 20px cyan;
}

.nuke{
font-size:50px;
margin-top:20px;
color:red;
text-shadow:0 0 20px red;
}

@keyframes glitch{
0%{transform:translate(0);}
25%{transform:translate(-2px,2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-1px,1px);}
100%{transform:translate(0);}
}

/* FLASH */
.flash{
position:fixed;
inset:0;
background:white;
opacity:0;
z-index:999999;
pointer-events:none;
}

.flash.active{
animation:flash .5s;
}

@keyframes flash{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* LOADING */
#loading{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99998;
}

.bar{
width:400px;
height:15px;
background:#111;
border-radius:50px;
overflow:hidden;
box-shadow:0 0 20px cyan;
}

.fill{
width:0%;
height:100%;
background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,purple);
}

/* LOGIN */
#login{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#111,#000);
z-index:99998;
}

.box{
width:420px;
padding:40px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-radius:20px;
text-align:center;
box-shadow:0 0 40px cyan;
}

input{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:#111;
color:white;
text-align:center;
}

button{
margin-top:20px;
padding:15px 40px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,cyan,blue,purple);
color:white;
cursor:pointer;
}

/* SITE */
#site{
display:none;
height:100vh;
overflow:auto;
padding:40px;
background:linear-gradient(-45deg,#000,#111,#000,#0a0a0a);
}

.title{
font-size:85px;
text-align:center;
text-shadow:0 0 30px cyan;
}

.btns{
text-align:center;
margin-top:30px;
}

.btn{
display:inline-block;
padding:15px 40px;
margin:10px;
border-radius:50px;
text-decoration:none;
color:white;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
}

.card{
background:rgba(255,255,255,.05);
margin:15px auto;
padding:20px;
border-radius:15px;
max-width:600px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px cyan;
}

#particles{
position:fixed;
inset:0;
pointer-events:none;
}

.p{
position:absolute;
width:6px;
height:6px;
background:cyan;
border-radius:50%;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div class="hud"></div>
<div id="particles"></div>
<div class="flash" id="flash"></div>

<!-- INTRO -->
<div id="intro">
<div class="introText">RESPONSE ENGLAND</div>
<div class="nuke" id="nuke">NUKE: 5.4.3.2.1</div>
</div>

<!-- LOADING -->
<div id="loading">
<h2>Booting Response England...</h2>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h1>SECURITY ACCESS - RESPONSE ENGLAND</h1>
<input id="code" type="password" placeholder="****">
<button onclick="check()">ENTER</button>
</div>
</div>

<!-- SITE -->
<div id="site">

<div class="title">RESPONSE ENGLAND</div>

<div class="btns">
<a class="btn" href="https://www.roblox.com/games/71350675430720/Response-London">🎮 ROBLOX</a>
<a class="btn" href="https://discord.gg/UFhpVPVK">💬 DISCORD</a>
</div>

<h1 style="text-align:center;margin-top:50px;">👑 STAFF</h1>

<div class="card">Nadz — Lead Dev</div>
<div class="card">Raz — Support</div>
<div class="card">Pete — Manager</div>
<div class="card">Alex — Founder</div>

<div style="text-align:center;margin-top:50px;">
<h2>📊 RESPONSE ENGLAND STATUS</h2>
<div class="card">Players: 1200+</div>
<div class="card">Discord Active</div>
<div class="card">Updates Weekly</div>
</div>

</div>

<script>

/* NUKE */
let nuke=5;
let nukeText=document.getElementById("nuke");

let interval=setInterval(()=>{

nuke--;

if(nuke>0){
nukeText.innerText="NUKE: 5.4.3.2."+nuke;
}

if(nuke===0){
clearInterval(interval);

nukeText.innerText="💥 BOOM!";

document.getElementById("flash").classList.add("active");

setTimeout(()=>{

document.getElementById("intro").style.display="none";
document.getElementById("loading").style.display="flex";

startLoading();

},1000);
}

},800);

/* LOADING */
function startLoading(){
let f=0;

let load=setInterval(()=>{
f++;
document.getElementById("fill").style.width=f+"%";

if(f>=100){
clearInterval(load);

document.getElementById("loading").style.display="none";
document.getElementById("login").style.display="flex";
}

},20);
}

/* LOGIN */
function check(){
if(document.getElementById("code").value==="1234"){
document.getElementById("login").style.display="none";
document.getElementById("site").style.display="block";
}else{
alert("WRONG CODE");
}
}

/* PARTICLES */
for(let i=0;i<60;i++){
let d=document.createElement("div");
d.className="p";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(Math.random()*10+5)+"s";
document.getElementById("particles").appendChild(d);
}

</script>

</body>
</html>
